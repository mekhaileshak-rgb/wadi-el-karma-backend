version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: wadi_el_karma_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wadi_el_karma
      MYSQL_USER: wadi_user
      MYSQL_PASSWORD: wadi_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  api:
    build: .
    container_name: wadi_el_karma_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://wadi_user:wadi_password@db:3306/wadi_el_karma
      - SECRET_KEY=change-this-to-a-very-long-random-secret-key-in-production
      - DEBUG=False
      - ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:5173"]
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_placeholder}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
